app:
  name: Supply Chain Sales Prediction API
  version: "2.0.0"
  description: FastAPI inference service for XGBoost supply chain sales prediction
  team: Team C
  organization: Evoastra Ventures (OPC) Pvt Ltd

server:
  host: 0.0.0.0
  port: 8000
  workers: 1
  log_level: info
  reload: false

model:
  path: artifacts/model.pkl
  type: XGBoostRegressor
  version: "2.0.0"
  target: sales
  transform: log_scale
  inverse_transform: expm1

artifacts:
  columns_path: artifacts/columns.pkl
  metrics_path: artifacts/metrics.json

# FIX: Updated features list to match what the model ACTUALLY uses
# Removed fake features: lag_1, rolling_mean, order_day, order_week, order_month, weekday, is_weekend
features:
  numerical:
    - days_for_shipping_(real)
    - days_for_shipment_(scheduled)
    - order_item_quantity
    - product_price
    - delivery_days
  categorical:
    - type
    - shipping_mode
    - order_status
    - market
    - customer_segment
    - order_region
    - category_name
    - department_name

endpoints:
  predict:
    path: /predict
    method: POST
    description: Predict sales value for a single order
  predict_batch:
    path: /predict/batch
    method: POST
    description: Predict sales values for multiple orders
  health:
    path: /health
    method: GET
    description: Health check endpoint

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
  allow_headers:
    - "*"
