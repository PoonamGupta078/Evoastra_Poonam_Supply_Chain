version: "3.9"

services:
  supply_chain_api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: supply_chain_api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      # FIX: Removed the non-existent ./models volume mapping
    environment:
      # FIX: Corrected MODEL_PATH to point to artifacts
      - MODEL_PATH=/app/artifacts/model.pkl
      - COLUMNS_PATH=/app/artifacts/columns.pkl
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      # FIX: Health endpoint is now correctly implemented in src/app.py
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# FIX: Removed mlflow service from here.
# It was aspirational and causing confusion since there's no actual MLflow integration in train.py.
